<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secret Santa 🎅</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #111;
      padding: 30px;
      border-radius: 15px;
      width: 330px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      border-radius: 5px;
      border: none;
      font-size: 14px;
    }
    button {
      margin-top: 20px;
      padding: 12px;
      width: 100%;
      font-size: 16px;
      background: #e63946;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled {
      background: gray;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
      color: #2ecc71;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>🎄 Secret Santa 🎄</h2>
    <p>Enter your name and click once.</p>

    <input id="username" placeholder="Enter your name exactly" />

    <button id="pickBtn">Generate Name</button>

    <div id="result"></div>
  </div>

  <script>
    // 🔥 FIREBASE CONFIG (PASTE YOURS)
    const firebaseConfig = {
  apiKey: "AIzaSyAZHXvGAJ_xqi-HHH0MhVKS-zYdPbSqvPU",
  authDomain: "secret-santa-5b7ec.firebaseapp.com",
  projectId: "secret-santa-5b7ec",
  storageBucket: "secret-santa-5b7ec.firebasestorage.app",
  messagingSenderId: "398323851610",
  appId: "1:398323851610:web:e285e322d94de31f6f1363",
  measurementId: "G-MSZ5VZCNGG"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const btn = document.getElementById("pickBtn");
    const result = document.getElementById("result");
    const usernameInput = document.getElementById("username");

    let deviceId = localStorage.getItem("secretSantaDevice");
    if (!deviceId) {
      deviceId = crypto.randomUUID();
      localStorage.setItem("secretSantaDevice", deviceId);
    }

    btn.onclick = async () => {
      const username = usernameInput.value.trim();

      if (!username) {
        alert("Please enter your name.");
        return;
      }

      btn.disabled = true;

      const userRef = db.collection("users").doc(deviceId);
      const userSnap = await userRef.get();

      if (userSnap.exists) {
        result.innerText = "🎁 You already picked!";
        return;
      }

      const namesRef = db.collection("config").doc("names");

      try {
        await db.runTransaction(async (tx) => {
          const snap = await tx.get(namesRef);
          let names = snap.data().remaining;

          // ❌ Remove user's own name
          names = names.filter(n => n !== username);

          if (names.length === 0) {
            throw new Error("No valid names left.");
          }

          const index = Math.floor(Math.random() * names.length);
          const picked = names[index];

          // Remove picked name globally
          const updatedRemaining = snap.data().remaining.filter(n => n !== picked);

          tx.update(namesRef, { remaining: updatedRemaining });
          tx.set(userRef, {
            user: username,
            picked: picked
          });

          result.innerText = "🎅 You got: " + picked;
        });
      } catch (e) {
        console.error(e);
        result.innerText = "⚠️ " + e.message;
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
